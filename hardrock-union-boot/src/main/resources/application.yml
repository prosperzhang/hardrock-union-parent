spring:
  application:
    name: hardrock-union
  threads:
    virtual:
      enabled: true
  profiles:
    active: local
  sql:
    init:
      mode: ${HRU_SQL_INIT_MODE:never}
      schema-locations:
        - classpath*:db/mysql/app-registry-schema.sql
        - classpath*:db/mysql/tenant-registry-schema.sql
        - classpath*:db/mysql/*.sql
  datasource:
    dynamic:
      primary: master
      strict: true
      datasource:
        master:
          url: jdbc:mysql://${HRU_DB_MASTER_HOST:192.168.3.110}:${HRU_DB_MASTER_PORT:3307}/${HRU_DB_NAME:hardrock_db}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
          username: ${HRU_DB_MASTER_USERNAME:root}
          password: ${HRU_DB_MASTER_PASSWORD:123456}
          driver-class-name: com.mysql.cj.jdbc.Driver
          maximum-pool-size: ${HRU_DB_MASTER_MAX_POOL_SIZE:64}
          minimum-idle: ${HRU_DB_MASTER_MIN_IDLE:8}
          connection-timeout: 3000
          validation-timeout: 1000
        slave1:
          url: jdbc:mysql://${HRU_DB_SLAVE1_HOST:192.168.3.110}:${HRU_DB_SLAVE1_PORT:3308}/${HRU_DB_NAME:hardrock_db}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
          username: ${HRU_DB_SLAVE1_USERNAME:${HRU_DB_MASTER_USERNAME:root}}
          password: ${HRU_DB_SLAVE1_PASSWORD:${HRU_DB_MASTER_PASSWORD:123456}}
          driver-class-name: com.mysql.cj.jdbc.Driver
          maximum-pool-size: ${HRU_DB_SLAVE1_MAX_POOL_SIZE:32}
          minimum-idle: ${HRU_DB_SLAVE1_MIN_IDLE:4}
          connection-timeout: 3000
          validation-timeout: 1000
        slave2:
          url: jdbc:mysql://${HRU_DB_SLAVE2_HOST:192.168.3.110}:${HRU_DB_SLAVE2_PORT:3309}/${HRU_DB_NAME:hardrock_db}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
          username: ${HRU_DB_SLAVE2_USERNAME:${HRU_DB_MASTER_USERNAME:root}}
          password: ${HRU_DB_SLAVE2_PASSWORD:${HRU_DB_MASTER_PASSWORD:123456}}
          driver-class-name: com.mysql.cj.jdbc.Driver
          maximum-pool-size: ${HRU_DB_SLAVE2_MAX_POOL_SIZE:32}
          minimum-idle: ${HRU_DB_SLAVE2_MIN_IDLE:4}
          connection-timeout: 3000
          validation-timeout: 1000
  data:
    redis:
      host: ${HRU_REDIS_HOST:192.168.3.110}
      port: ${HRU_REDIS_PORT:6379}
      password: ${HRU_REDIS_PASSWORD:123456}
      timeout: 6s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 3s
  servlet:
    multipart:
      max-file-size: ${HRU_FILE_MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${HRU_FILE_MULTIPART_MAX_REQUEST_SIZE:20MB}

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    max-connections: ${HRU_TOMCAT_MAX_CONNECTIONS:65535}
    accept-count: ${HRU_TOMCAT_ACCEPT_COUNT:10000}
    connection-timeout: 3s
    keep-alive-timeout: 20s
    processor-cache: 200

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml,classpath*:/META-INF/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.hardrockunion.platform.iam.domain.entity,com.hardrockunion.platform.tenant.domain.entity,com.hardrockunion.platform.message.domain.entity,com.hardrockunion.platform.region.domain.entity,com.hardrockunion.platform.workflow.domain.entity,com.hardrockunion.solution.wsgm.domain.entity,com.hardrockunion.business.project.domain.entity,com.hardrockunion.business.merchant.domain.entity,com.hardrockunion.business.warehouse.domain.entity,com.hardrockunion.business.logistics.domain.entity
  global-config:
    banner: false

arkx:
  uid:
    assigner-mode: db
    generator-mode: memory

hardrock:
  security:
    jwt-secret: ${HRU_JWT_SECRET:hardrock-union-secret-hardrock-union-secret}
    jwt-expire-seconds: ${HRU_JWT_EXPIRE_SECONDS:7200}
  integration:
    tencent-map:
      api-key: ${TENCENT_MAP_API_KEY:}
      base-url: ${TENCENT_MAP_BASE_URL:https://apis.map.qq.com}
      connect-timeout: ${TENCENT_MAP_CONNECT_TIMEOUT:5s}
      read-timeout: ${TENCENT_MAP_READ_TIMEOUT:30s}
    ai:
      deepseek:
        enabled: ${DEEPSEEK_ENABLED:true}
        base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
        api-key: ${DEEPSEEK_API_KEY:}
        default-model: ${DEEPSEEK_DEFAULT_MODEL:deepseek-v4-flash}
        connect-timeout: ${DEEPSEEK_CONNECT_TIMEOUT:5s}
        read-timeout: ${DEEPSEEK_READ_TIMEOUT:120s}
        default-max-tokens: ${DEEPSEEK_DEFAULT_MAX_TOKENS:2048}
        default-temperature: ${DEEPSEEK_DEFAULT_TEMPERATURE:0.2}
  storage:
    aliyun-oss:
      endpoint: ${ALIYUN_OSS_ENDPOINT:}
      public-endpoint: ${ALIYUN_OSS_PUBLIC_ENDPOINT:${ALIYUN_OSS_ENDPOINT:}}
      bucket-name: ${ALIYUN_OSS_BUCKET_NAME:}
      access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
      url-prefix: ${ALIYUN_OSS_URL_PREFIX:}
  file:
    image:
      max-size: ${HRU_FILE_IMAGE_MAX_SIZE:5242880}
      allowed-content-types:
        - image/jpeg
        - image/png
        - image/webp
        - image/gif

logging:
  level:
    root: info

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
